name: Deploy EC2

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /opt/btwobet
      APP_URL: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter Web
        working-directory: mobile
        run: |
          flutter pub get
          BASE_URL="${APP_URL:-https://btwobet.click}"
          flutter build web --release --dart-define=API_BASE_URL="${BASE_URL}/api"

      - name: Verify Flutter web bundle
        working-directory: mobile
        run: |
          test -f build/web/main.dart.js
          grep -q 'Regras do bol' build/web/main.dart.js || { echo "::error::Rules card strings missing from web build"; exit 1; }

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          tr -d '\r' < ~/.ssh/deploy_key > ~/.ssh/deploy_key.tmp && mv ~/.ssh/deploy_key.tmp ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "${EC2_USER}@${EC2_HOST}" "echo ssh_ok && mkdir -p ${DEPLOY_DIR} && df -h ${DEPLOY_DIR} || df -h /"

      - name: Sync files to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -azv --delete --info=stats2 \
            --exclude '.git' \
            --exclude 'backend/.env' \
            --exclude 'backend/vendor' \
            --exclude 'mobile/.dart_tool' \
            --exclude '.env.production' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ "${EC2_USER}@${EC2_HOST}:${DEPLOY_DIR}/"

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${EC2_USER}@${EC2_HOST}" << 'REMOTE'
          set -euo pipefail
          cd /opt/btwobet
          chmod +x deploy/flutter-web-prod.sh
          ./deploy/flutter-web-prod.sh
          REMOTE
