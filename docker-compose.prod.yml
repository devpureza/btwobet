# Produção — EC2 com Docker Compose
# Uso: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./mobile/build/web:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_SEED: "${RUN_SEED:-false}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-btwobet}
      POSTGRES_USER: ${DB_USERNAME:-btwobet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-btwobet} -d ${DB_DATABASE:-btwobet}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
