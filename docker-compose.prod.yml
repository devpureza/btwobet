# Produção — EC2 com Docker Compose
# Uso: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./mobile/build/web:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - app_public_storage:/var/www/html/storage/app/public
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_SEED: "${RUN_SEED:-false}"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - app_public_storage:/var/www/html/storage/app/public
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_SEED: "false"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-btwobet}
      POSTGRES_USER: ${DB_USERNAME:-btwobet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-btwobet} -d ${DB_DATABASE:-btwobet}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_public_storage:
  caddy_data:
  caddy_config:
