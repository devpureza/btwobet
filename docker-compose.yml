services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: btwobet
      DB_USERNAME: btwobet
      DB_PASSWORD: btwobet
    working_dir: /var/www/html
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: btwobet
      POSTGRES_USER: btwobet
      POSTGRES_PASSWORD: btwobet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
